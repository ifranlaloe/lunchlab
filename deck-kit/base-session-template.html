<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunchLab Session Title</title>
  <link rel="stylesheet" href="../deck-kit/theme.css" />
</head>
<body>
  <div class="deck">
    <div class="stage">
      <div class="slides">
        <section class="slide active">
          <div class="eyebrow">LunchLab</div>
          <h1>Session Title</h1>
          <div class="subtitle">Subtitle and context for this session.</div>
        </section>

        <section class="slide">
          <div class="eyebrow">Agenda</div>
          <h2>What we will cover</h2>
          <div class="content two-col">
            <div class="card">
              <h3>Part 1</h3>
              <ul>
                <li>Key concept 1</li>
                <li>Key concept 2</li>
              </ul>
            </div>
            <div class="card">
              <h3>Part 2</h3>
              <ul>
                <li>Workshop prompt</li>
                <li>Takeaways</li>
              </ul>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div class="footer">
      <div class="controls">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
      </div>
      <div class="counter" id="counter">1 / 2</div>
      <div class="hint">Use <span class="kbd">←</span> <span class="kbd">→</span> or space</div>
    </div>
  </div>

  <script src="../deck-kit/deck.js" defer></script>
</body>
</html>
