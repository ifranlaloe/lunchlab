<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level 2 overlay — Telecom anchor</title>
  <desc id="desc">Level 2 overlay marker for Telecom, aligned to Level 1 coordinates for stack/layer composition.</desc>
  <defs>
    <style>
      .marker { fill: #8b5cf6; stroke: #000; stroke-width: 3; }
      .ring { fill: none; stroke: #8b5cf6; stroke-width: 4; opacity: .45; }
      .line { stroke: #000; stroke-width: 2.5; }
      .tag { fill: #fff; stroke: #000; stroke-width: 2; rx: 8; }
