<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level 3: Inside one infrastructure domain</title>
  <desc id="desc">A selected rail network domain with internal elements and dependencies.</desc>
  <defs>
    <style>
      .bg{fill:#0d1324}.panel{fill:#141e36;stroke:#7dabff;stroke-width:4}.inner{fill:#1f2c4d;stroke:#9ec2ff;stroke-width:2.5}
      .line{stroke:#73d2ff;stroke-width:3;fill:none}.title{font:700 38px Inter,Arial,sans-serif;fill:#e8f1ff}.txt{font:600 22px Inter,Arial,sans-serif;fill:#d9e9ff}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="78">Level 3 — Inside one infrastructure domain (Rail network)</text>

  <rect class="panel" x="220" y="150" width="1160" height="670" rx="34"/>
  <text class="txt" x="260" y="195">Selected Level 2 domain: Rail network</text>

  <rect class="inner" x="290" y="260" width="210" height="90" rx="14"/><text class="txt" x="335" y="315">Stations</text>
  <rect class="inner" x="560" y="240" width="210" height="90" rx="14"/><text class="txt" x="620" y="295">Tracks</text>
  <rect class="inner" x="830" y="260" width="210" height="90" rx="14"/><text class="txt" x="880" y="315">Switches</text>
  <rect class="inner" x="1100" y="240" width="210" height="90" rx="14"/><text class="txt" x="1165" y="295">Signals</text>

  <rect class="inner" x="370" y="500" width="260" height="100" rx="14"/><text class="txt" x="430" y="560">Control room</text>
  <rect class="inner" x="700" y="490" width="280" height="100" rx="14"/><text class="txt" x="760" y="550">Timetable system</text>
  <rect class="inner" x="1040" y="500" width="260" height="100" rx="14"/><text class="txt" x="1080" y="560">Power sections</text>

  <path class="line" d="M500 305 L560 285 L770 285 L830 305"/>
  <path class="line" d="M1040 305 L1100 285"/>
  <path class="line" d="M395 350 L500 500"/>
  <path class="line" d="M665 330 L840 490"/>
  <path class="line" d="M1180 330 L1170 500"/>
  <path class="line" d="M630 550 L700 540"/>
  <path class="line" d="M980 540 L1040 550"/>
