<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Concertgebouw detail zoom</title>
  <desc id="desc">Detailed technical-like schematic inspired by Concertgebouw interior zones and wiring paths for the final zoom level.</desc>
  <defs>
    <style>
      .bg { fill: #f7faff; }
      .grid { stroke: #d7e3fa; stroke-width: 1; }
      .shell { fill: #ffffff; stroke: #1c4a96; stroke-width: 4; }
      .room { fill: #eef4ff; stroke: #5d82c4; stroke-width: 2; }
      .wire { fill: none; stroke: #1c4a96; stroke-width: 4; }
      .wire2 { fill: none; stroke: #b36b00; stroke-width: 4; stroke-dasharray: 10 8; }
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #0b1f4d; }
      .txt { font: 600 20px Inter, Arial, sans-serif; fill: #102a5c; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <g>
    <path class="grid" d="M0 100H1600 M0 200H1600 M0 300H1600 M0 400H1600 M0 500H1600 M0 600H1600 M0 700H1600 M0 800H1600"/>
    <path class="grid" d="M100 0V900 M250 0V900 M400 0V900 M550 0V900 M700 0V900 M850 0V900 M1000 0V900 M1150 0V900 M1300 0V900 M1450 0V900"/>
  </g>
  <text class="title" x="70" y="80">Zoom 4 — Concertgebouw detail (technical view)</text>

  <rect class="shell" x="260" y="180" width="1080" height="560" rx="22"/>
  <ellipse class="room" cx="800" cy="360" rx="240" ry="120"/>
  <rect class="room" x="340" y="280" width="170" height="130" rx="12"/>
  <rect class="room" x="1090" y="280" width="170" height="130" rx="12"/>
  <rect class="room" x="380" y="510" width="260" height="170" rx="12"/>
  <rect class="room" x="960" y="510" width="260" height="170" rx="12"/>

  <path class="wire" d="M510 345 L560 345"/>
  <path class="wire" d="M1040 345 L1090 345"/>
  <path class="wire" d="M800 480 L800 510"/>
  <path class="wire" d="M640 595 L960 595"/>
  <path class="wire2" d="M640 645 C760 700 840 700 960 645"/>

  <text class="txt" x="730" y="365">Main Hall</text>
  <text class="txt" x="355" y="355">West Foyer</text>
  <text class="txt" x="1110" y="355">East Foyer</text>
  <text class="txt" x="420" y="600">Backstage</text>
  <text class="txt" x="1030" y="600">Control Rooms</text>
</svg>
