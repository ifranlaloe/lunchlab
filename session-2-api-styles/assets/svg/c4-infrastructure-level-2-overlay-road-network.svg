<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level 2 overlay — Road network anchor</title>
  <desc id="desc">Level 2 overlay marker for Road network, aligned to Level 1 coordinates for stack/layer composition.</desc>
  <defs>
    <style>
      .marker { fill: #ef4444; stroke: #000; stroke-width: 3; }
      .ring { fill: none; stroke: #ef4444; stroke-width: 4; opacity: .45; }
      .line { stroke: #000; stroke-width: 2.5; }
      .tag { fill: #fff; stroke: #000; stroke-width: 2; rx: 8; }
      .txt { font: 700 22px Inter, Arial, sans-serif; fill: #000; }
    </style>
  </defs>
  <circle class="ring" cx="845" cy="438" r="30"/>
  <circle class="marker" cx="845" cy="438" r="11"/>
  <path class="line" d="M 845 438 L 760 390"/>
  <rect class="tag" x="520" y="346" width="250" height="44"/>
  <text class="txt" x="560" y="376">Road network</text>
</svg>
