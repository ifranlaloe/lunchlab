<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level 2 overlay — Rail network anchor</title>
  <desc id="desc">Level 2 overlay marker for Rail network, aligned to Level 1 coordinates for stack/layer composition.</desc>
  <defs>
    <style>
      .marker { fill: #f59e0b; stroke: #000; stroke-width: 3; }
      .ring { fill: none; stroke: #f59e0b; stroke-width: 4; opacity: .45; }
      .line { stroke: #000; stroke-width: 2.5; }
      .tag { fill: #fff; stroke: #000; stroke-width: 2; rx: 8; }
      .txt { font: 700 22px Inter, Arial, sans-serif; fill: #000; }
    </style>
  </defs>
  <circle class="ring" cx="860" cy="420" r="30"/>
  <circle class="marker" cx="860" cy="420" r="11"/>
  <path class="line" d="M 860 420 L 960 360"/>
  <rect class="tag" x="970" y="318" width="230" height="44"/>
  <text class="txt" x="1010" y="348">Rail network</text>
</svg>
