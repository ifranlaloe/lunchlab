<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Amsterdam city zoom with Concertgebouw area highlighted</title>
  <desc id="desc">A stylized Amsterdam street and canal map with the Concertgebouw district emphasized for the second zoom level.</desc>
  <defs>
    <style>
      .bg { fill: #eef5ff; }
      .water { fill: #dcecff; stroke: #a7c4ef; stroke-width: 2; }
      .road { fill: none; stroke: #ffffff; stroke-width: 16; }
      .road-outline { fill: none; stroke: #b8c9e8; stroke-width: 20; }
      .ring { fill: none; stroke: #7da3df; stroke-width: 12; }
      .highlight { fill: rgba(255, 172, 64, 0.20); stroke: #b36b00; stroke-width: 5; }
      .poi { fill: #164194; }
      .txt { font: 600 24px Inter, Arial, sans-serif; fill: #102a5c; }
      .title { font: 700 38px Inter, Arial, sans-serif; fill: #0b1f4d; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" />
  <text class="title" x="70" y="80">Zoom 2 — Amsterdam topology</text>

  <path class="water" d="M120 180 C320 130 500 130 720 180 C930 230 1160 230 1450 170 L1450 290 C1160 350 920 350 710 300 C510 250 330 250 120 300 Z"/>
  <path class="water" d="M190 560 C380 530 560 540 770 590 C970 640 1180 640 1430 580 L1430 690 C1180 750 960 750 760 700 C560 650 380 650 190 680 Z"/>

  <circle class="ring" cx="820" cy="470" r="260"/>
  <circle class="ring" cx="820" cy="470" r="180"/>

  <path class="road-outline" d="M280 760 C520 620 700 530 860 420 C1020 300 1190 220 1380 160"/>
  <path class="road" d="M280 760 C520 620 700 530 860 420 C1020 300 1190 220 1380 160"/>

  <path class="road-outline" d="M260 240 C470 320 620 380 810 470 C980 550 1160 610 1360 650"/>
  <path class="road" d="M260 240 C470 320 620 380 810 470 C980 550 1160 610 1360 650"/>

  <rect class="highlight" x="650" y="500" width="260" height="170" rx="18"/>
  <circle class="poi" cx="770" cy="575" r="10"/>
  <text class="txt" x="800" y="582">Concertgebouw area</text>
  <text class="txt" x="1240" y="840">Amsterdam</text>
</svg>
