<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Level 2 overlay — Data centers anchor</title>
  <desc id="desc">Level 2 overlay marker for Data centers, aligned to Level 1 coordinates for stack/layer composition.</desc>
  <defs>
    <style>
      .marker { fill: #3b82f6; stroke: #000; stroke-width: 3; }
