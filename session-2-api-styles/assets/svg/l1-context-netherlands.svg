<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">West Europe map zoom with Netherlands highlighted</title>
  <desc id="desc">A simplified West Europe map where the Netherlands is highlighted, showing the first zoom level in a continuous sequence.</desc>
  <defs>
    <style>
      .sea { fill: #eaf3ff; }
      .land { fill: #f7f9fc; stroke: #9db0cf; stroke-width: 3; }
      .nl { fill: #ffd9a8; stroke: #b36b00; stroke-width: 5; }
      .city { fill: #164194; }
      .txt { font: 600 24px Inter, Arial, sans-serif; fill: #102a5c; }
      .title { font: 700 38px Inter, Arial, sans-serif; fill: #0b1f4d; }
      .halo { fill: none; stroke: #b36b00; stroke-width: 4; stroke-dasharray: 12 8; }
    </style>
  </defs>

  <rect class="sea" x="0" y="0" width="1600" height="900" />
  <text class="title" x="70" y="80">Zoom 1 — West Europe context</text>

  <!-- Simplified surrounding landmasses -->
  <path class="land" d="M120 140 L560 120 L690 210 L710 330 L620 430 L430 510 L300 640 L120 610 Z" />
  <path class="land" d="M720 110 L1060 120 L1220 210 L1210 350 L1060 430 L930 470 L820 430 L760 350 Z" />
  <path class="land" d="M1060 400 L1430 430 L1490 590 L1400 740 L1170 790 L1020 730 L980 580 Z" />
  <path class="land" d="M700 480 L980 470 L1010 730 L760 790 L640 700 L620 560 Z" />

  <!-- Netherlands highlight in west europe cluster -->
  <path class="nl" d="M785 225 L830 208 L870 220 L888 255 L873 300 L842 328 L808 340 L780 314 L772 273 Z" />
  <circle class="halo" cx="830" cy="275" r="85" />

  <circle class="city" cx="835" cy="258" r="8" />
  <text class="txt" x="860" y="265">Amsterdam</text>
  <text class="txt" x="915" y="315">Netherlands</text>

  <text class="txt" x="760" y="180">North Sea</text>
  <text class="txt" x="540" y="320">United Kingdom</text>
  <text class="txt" x="1030" y="325">Germany</text>
  <text class="txt" x="1010" y="520">Belgium</text>
  <text class="txt" x="1140" y="680">France</text>
</svg>
